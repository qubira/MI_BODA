 <body>
  <div class="countdown-container">
   <div class="countdown-block">
    <div class="countdown-number" id="days" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 400.127px;">00</div>
    <div class="countdown-label" id="days-label" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 100.032px;">DÍAS</div>
   </div>
   <div class="countdown-block">
    <div class="countdown-number" id="hours" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 400.127px;">00</div>
    <div class="countdown-label" id="hours-label" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 100.032px;">HORAS</div>
   </div>
   <div class="countdown-block">
    <div class="countdown-number" id="minutes" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 400.127px;">00</div>
    <div class="countdown-label" id="minutes-label" style="color: rgb(0, 0, 0); font-family: YAFdJllHsUM, serif; font-size: 100.032px;">MINUTOS</div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      target_date: '2024-12-31',
      days_text: 'DÍAS',
      hours_text: 'HORAS',
      minutes_text: 'MINUTOS',
      text_color: '#000000',
      font_family: 'Noto Serif Display',
      font_size: 72
    };

    let updateInterval;

    function updateCountdown(config) {
      const targetDate = new Date(config.target_date || defaultConfig.target_date).getTime();
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    }

    async function onConfigChange(config) {
      const textColor = config.text_color || defaultConfig.text_color;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      document.getElementById('days-label').textContent = config.days_text || defaultConfig.days_text;
      document.getElementById('hours-label').textContent = config.hours_text || defaultConfig.hours_text;
      document.getElementById('minutes-label').textContent = config.minutes_text || defaultConfig.minutes_text;

      const numbers = document.querySelectorAll('.countdown-number');
      const labels = document.querySelectorAll('.countdown-label');

      numbers.forEach(num => {
        num.style.color = textColor;
        num.style.fontFamily = `${fontFamily}, serif`;
        num.style.fontSize = `${fontSize}px`;
      });

      labels.forEach(label => {
        label.style.color = textColor;
        label.style.fontFamily = `${fontFamily}, serif`;
        label.style.fontSize = `${fontSize * 0.25}px`;
      });

      if (updateInterval) {
        clearInterval(updateInterval);
      }

      updateCountdown(config);
      updateInterval = setInterval(() => updateCountdown(config), 60000);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [{
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (value) => {
              config.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (value) => {
              config.font_size = value;
              window.elementSdk.setConfig({ font_size: value });
            }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['target_date', config.target_date || defaultConfig.target_date],
          ['days_text', config.days_text || defaultConfig.days_text],
          ['hours_text', config.hours_text || defaultConfig.hours_text],
          ['minutes_text', config.minutes_text || defaultConfig.minutes_text]
        ])
      });
    }
  </script>
