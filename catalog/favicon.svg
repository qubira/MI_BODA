<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#0D0D0D"/>
  <!-- Two interlocked rings -->
  <circle cx="22" cy="36" r="13" fill="none" stroke="#C9A054" stroke-width="4.5"/>
  <circle cx="42" cy="36" r="13" fill="none" stroke="#C9A054" stroke-width="4.5"/>
  <!-- Cover seam so they look interlocked: left ring goes over right on bottom -->
  <path d="M32 24.5 A13 13 0 0 0 32 47.5" fill="none" stroke="#0D0D0D" stroke-width="5"/>
  <path d="M32 24.5 A13 13 0 0 1 32 47.5" fill="none" stroke="#C9A054" stroke-width="4.5"/>
  <!-- Small diamond top center -->
  <polygon points="32,10 36,17 32,21 28,17" fill="#C9A054"/>
  <polygon points="32,10 36,17 32,14 28,17" fill="#B8893E" opacity="0.7"/>
</svg>
